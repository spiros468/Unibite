<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBite - Εγγραφή</title>
    <link rel="stylesheet" href="login_register_style.css">
</head>
<body class="login-body">

    <div class="login-container">
        <h1 class="login-logo">UniBite🍖</h1>
        <h2 class="login-logo-subtitle1">Δημιουργία Λογαριασμού</h2>
        
        <form class="login-form" id="registerForm">
            <div class="form-group">
                <label for="fullname">Ονοματεπώνυμο</label>
                <input type="text" id="fullname" required placeholder="π.χ. Γιώργος Παπαδόπουλος">
            </div>

            <div class="form-group">
                <label for="university">Πανεπιστήμιο:</label>
                <select id="university" class="app-select" required>
                    <option value="" disabled selected>Επέλεξε το Πανεπιστήμιο σου</option>
                    <option value="uoa">Εθνικό και Καποδιστριακό Πανεπιστήμιο Αθηνών</option>
                    <option value="ntua">Οικονομικό Πανεπιστήμιο Αθηνών</option>
                    <option value="panteion">Πάντειο Πανεπιστήμιο Κοινωνικών και Πολιτικών Επιστημών</option>
                    <option value="aua">Γεωπονικό Πανεπιστήμιο Αθηνών</option>
                    <option value="hua">Χαροκόπειο Πανεπιστήμιο</option>
                    <option value="unipi">Πανεπιστήμιο Πειραιώς</option>
                    <option value="uniwa">Πανεπιστήμιο Δυτικής Αττικής</option>
                    <option value="asfa">Ανωτάτη Σχολή Καλών Τεχνών</option>
                    <option value="auth">Αριστοτέλειο Πανεπιστήμιο Θεσσαλονίκης</option>
                    <option value="uom">Πανεπιστήμιο Μακεδονίας</option>
                    <option value="ihu">Διεθνές Πανεπιστήμιο της Ελλάδος</option>
                    <option value="upatras">Πανεπιστήμιο Πατρών</option>
                    <option value="uoi">Πανεπιστήμιο Ιωαννίνων</option>
                    <option value="duth">Δημοκρίτειο Πανεπιστήμιο Θράκης</option>
                    <option value="uoc">Πανεπιστήμιο Κρήτης</option>
                    <option value="tuc">Πολυτεχνείο Κρήτης</option>
                    <option value="uth">Πανεπιστήμιο Θεσσαλίας</option>
                    <option value="aegean">Πανεπιστήμιο Αιγαίου</option>
                    <option value="ionio">Ιόνιο Πανεπιστήμιο</option>
                    <option value="uop">Πανεπιστήμιο Πελοποννήσου</option>
                    <option value="uowm">Πανεπιστήμιο Δυτικής Μακεδονίας</option>
                </select>
            </div>

            <div class="form-group">
                <label for="reg-email">Ακαδημαϊκό Email</label>
                <input type="email" id="reg-email" required placeholder="username@university.gr">
            </div>
            
            <div class="form-group">
                <label for="reg-password">Κωδικός πρόσβασης</label>
                <input type="password" id="reg-password" required placeholder="Δημιουργήστε έναν ισχυρό κωδικό">
            </div>

            <div class="form-group">
                <label for="confirm-password">Επιβεβαίωση Κωδικού</label>
                <input type="password" id="confirm-password" required placeholder="Επαναλάβετε τον κωδικό σας">
            </div>
            
            <button type="submit" class="login-submit-btn">Sign-In</Sign-up></button>
            
            <div class="form-footer">
                <p>Έχεις ήδη λογαριασμό; <a href="index.html">Login</a></p>
            </div>
        </form>
    </div>
    <script src="register.js"></script>
</body>
</html>
