<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBite - Dashboard Μάγειρα</title>
    <link rel="stylesheet" href="cook_style.css">
</head>
<body class="cook-body">

    <nav class="navbar">
        <div class="nav-logo">UniBite🍖</div>
        <div class="nav-wallet">
            <a href="../../settings/settings_cook.html" class="nav-logout-btn">Settings</a>
        </div>
    </nav>

    <main class="main-content cook-main-content">
        
        <section class="feed-section">

            <div class="cook-info-banner">
               <label class="user-avatar-upload">
                    <span id="image-placeholder"></span>
                    <img id="userAvatarImg" src="" alt="Avatar" style="display:none">
                </label>
                
                <div class="cook-data">
                    <h3 class="cook-name" id="cookName"></h3>
                    <p class="cook-university" id="cookUniversity"></p>
                </div>
                
                <div class="cook-points-badge">
                    <span class="points-label">Πόντοι Προσφοράς</span>
                    <strong class="points-count" id="cookPoints"></strong>
                </div>
            </div>
    
          

            <h2 class="page-title">Ενεργές Αγγελίες μου</h2>

            <div class="food-list" id="cookAdsContainer"></div> 
            <div class="create-ad-wrapper">
                <a href="ad/create_ad.html" class="map-btn-link create-ad-btn">Δημιουργία Νέας Αγγελίας</a>
            </div>

            <h2 class="page-title">Εισερχόμενα Αιτήματα Φοιτητών</h2>
            <div class="food-list" id="cookRequestsContainer"></div>

        </section>
    </main>
    <script src="cook.js"></script>
</body>
</html>
