<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Διαχείριση</title>
    <link rel="stylesheet" href="admin_style.css">
</head>
<body class="admin-body">

    <nav class="navbar">
        <div class="nav-logo">UniBite🍖 <span class="admin-badge"></span></div>
        <a href="../settings/settings_admin.html" class="nav-logout-btn">Settings</a>
    </nav>

    <main class="admin-wrapper">
        <h1 class="main-title">Admin Dashboard</h1>

        <section class="card stats">
            <h2>Συνολικά Στατιστικά</h2>
            <div class="stat-value">1.240</div>
            <p class="stat-desc">Συνολικές μερίδες που διαμοιράστηκαν</p>
        </section>

        <div class="grid-container">
            
            <section class="card">
                <h2>Top Donor Φοιτητής</h2>
                <div class="highlight">
                    <p class="name">Γιώργος Παπαδόπουλος</p>
                    <p class="score">85 μερίδες</p>
                </div>
            </section>

            <section class="card">
                <h2>Γεύματα με Υψηλότερη Αξιολόγηση</h2>
                <ul class="rating-list">
                    <li>
                        <span>Μακαρόνια με κιμά</span> 
                        <span class="rating">4.9/5</span>
                    </li>
                    <li>
                        <span>Φακές σούπα</span> 
                        <span class="rating">4.8/5</span>
                    </li>
                    <li>
                        <span>Κοτόπουλο με ρύζι</span> 
                        <span class="rating">4.7/5</span>
                    </li>
                </ul>
            </section>
            
        </div>
    </main>

</body>
</html>
