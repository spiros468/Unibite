<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBite - Σύνδεση</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-container">
        <h1 class="login-logo">UniBite</h1>
        <h2 class="login-logo-subtitle1">Καλώς ήρθες στο UniBite!</h2>
        <p class="login-subtitle2">Μαγειρεύεις; Μοιράσου το. Πεινάς; Φάε σπιτικά!</p>
        
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label for="email">Ακαδημαϊκό Email</label>
                <input type="email" id="email" required placeholder="username@university.gr">
            </div>
            
            <div class="form-group">
                <label for="password">Κωδικός πρόσβασης</label>
                <input type="password" id="password" required placeholder="Εισάγετε τον κωδικό σας">
            </div>
            
            <button type="submit" class="login-submit-btn">Login</button>
            
            <div class="form-footer">
                <p>Δεν έχεις λογαριασμό; <a href="register.html">Sign-Up</a></p>
            </div>
        </form>
    </div>

</body>
</html>
